version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: entreprise-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: entreprise-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: entreprise-backend
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-app}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: entreprise-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
